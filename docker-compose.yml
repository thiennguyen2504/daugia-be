services:
  db:
    image: postgres:16-alpine
    container_name: daugia-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - daugia-net

  redis:
    image: redis:7-alpine
    container_name: daugia-redis
    command: ["sh", "-c", "if [ -n \"$${REDIS_PASSWORD}\" ]; then redis-server --requirepass \"$${REDIS_PASSWORD}\"; else redis-server; fi"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - daugia-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: daugia-app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8081:8080"
    restart: unless-stopped
    networks:
      - daugia-net

volumes:
  pg_data:

networks:
  daugia-net:
    driver: bridge
