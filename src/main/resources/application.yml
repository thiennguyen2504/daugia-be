spring:
  application:
    name: bidding-app
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
        hibernate:
            format_sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:placeholder}
    password: ${MAIL_PASSWORD:placeholder}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1
  task:
    scheduling:
      pool:
        size: 2

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:demo}
  api-key: ${CLOUDINARY_API_KEY:demo}
  api-secret: ${CLOUDINARY_API_SECRET:demo}

jwt:
  # Set via environment variable JWT_SECRET
  secret-key: ${JWT_SECRET}
  expiration: 86400000 # 1 day
  refresh-token-expiration: 604800000 # 7 days
domain:
  url: http://localhost:3000

# NOTE: All entity PKs are now UUID strings (VARCHAR 36).
# For production migration, a Flyway/Liquibase script converting BIGINT PKs to VARCHAR is required.
auction:
  scheduler:
    enabled: true
  redis:
    pubsub:
      enabled: false
  antinsiping:
    window-seconds: 60
    extension-seconds: 120

vnpay:
  tmn-code: ${VNPAY_TMN_CODE:TESTCODE}
  hash-secret: ${VNPAY_HASH_SECRET:testsecret}
  pay-url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
  return-url: ${DOMAIN_URL:http://localhost:3000}/payment/vnpay-return
  api-url: https://sandbox.vnpayment.vn/merchant_webapi/api/transaction

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://db:5432/${DB_NAME}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
  data:
    redis:
      host: ${REDIS_HOST:redis}
auction:
  redis:
    pubsub:
      enabled: true

